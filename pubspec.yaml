name: flutter_taste_skill
description: A collection of "Agent Skills" and reference widgets for building high-quality, tasteful Flutter apps.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_driver:
    sdk: flutter
  go_router: ^17.2.3
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
